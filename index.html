<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Website</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <h1>Your Brand</h1>
  <p>Simple. Modern. Powerful.</p>
  <a href="#contact" class="btn">Get in Touch</a>
</header>

<section id="about">
  <h2>About Me</h2>
  <p>
    This is where you describe who you are, what you do, or what your business offers.
  </p>
</section>

<section id="services">
  <h2>Services</h2>
  <div class="cards">
    <div class="card">Web Development</div>
    <div class="card">Systems Administration</div>
    <div class="card">Consulting</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <form>
    <input type="text" placeholder="Your Name" required/>
    <input type="email" placeholder="Your Email" required/>
    <textarea placeholder="Your Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 Your Name. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
